<!DOCTYPE html> <!-- Declares the document as HTML5 -->
<html>
  <head>
    <title>Google Search Box</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="9h.css">
  </head>

  <body>
    <!-- Google logo centered -->
    <div>
      <img class="google-logo" src="google-logo.png">
    </div>

    <!-- Search input box -->
    <div>
      <input type="text" placeholder="Search Google or type a URL">
    </div>

    <!-- Search buttons -->
    <div>
      <button class="google-button">Google Search</button>
      <button class="google-button">I'm Feeling Lucky</button>
    </div>
  </body>
</html>
