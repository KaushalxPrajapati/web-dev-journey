<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Hotel Registration Form</title>

        <!-- Font Awesome -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

        <!-- Custom CSS -->
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <!-- Navbar -->
        <header>
            <nav class="navbar navbar-expand-lg bg-white py-3">
                <div class="container-fluid px-4 px-lg-5">
                    <a href="index.html" class="navbar-brand d-flex align-items-center gap-3 fw-bold bs-primary">
                        <i class="fa-solid fa-hotel"></i>
                        Serenity Hotels
                    </a>

                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navMenu">
                        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-4 mt-3 mt-lg-0">
                            <li class="nav-item">
                                <a href="#" class="nav-link text-secondary">Contact Us</a>
                            </li>
                            <li class="nav-item">
                                <a href="#" class="btn btn-primary px-3">Login</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <main>
            <section class="py-3">
                <div class="container page-container">
                    <div class="row gx-lg-5 gy-4 align-items-start">
                        <!-- Left Image Column -->
                        <div class="col-12 col-lg-6">
                            <div class="rounded-4 overflow-hidden">
                                <img src="hotel-img.png" alt="Luxury hotel pool area" class="w-100 h-100 object-fit-cover" />
                            </div>
                        </div>

                        <!-- Right Form Column -->
                        <div class="col-12 col-lg-6">
                            <div class="form-wrapper">
                                <h1 class="fw-bold mb-2">Hotel Registration</h1>

                                <form>
                                    <!-- Customer Details -->
                                    <h2 class="fs-6 fw-bold border-bottom pb-2 mb-3 mt-3">Customer Details</h2>

                                    <div class="row g-3 mb-3">
                                        <div class="col-12 col-md-6">
                                            <label for="name" class="form-label">Name</label>
                                            <input type="text" id="name" class="form-control" placeholder="John Doe" />
                                        </div>

                                        <div class="col-12 col-md-6">
                                            <label for="mobileNo" class="form-label">Mobile</label>
                                            <input type="tel" id="mobileNo" class="form-control" placeholder="+91 9876543210" minlength="10" maxlength="" />
                                        </div>

                                        <div class="col-12 col-md-6">
                                            <label for="numOfPeople" class="form-label">Number of People</label>
                                            <input type="number" id="numOfPeople" class="form-control" placeholder="1" />
                                        </div>

                                        <div class="col-12 col-md-6">
                                            <label for="days" class="form-label">Number of Days</label>
                                            <select id="days" name="days" class="form-select">
                                                <option value="1" selected>1 Day</option>
                                                <option value="2">2 Days</option>
                                                <option value="3">3 Days</option>
                                                <option value="4">4 Days</option>
                                                <option value="5">5 Days</option>
                                            </select>
                                        </div>
                                    </div>

                                    <!-- Room Type Selection -->
                                    <h2 class="fs-6 fw-bold border-bottom pb-2 mb-3 mt-4">Room Type Selection</h2>

                                    <div class="row g-3">
                                        <div class="col-12 col-md-6">
                                            <label class="option-card border rounded-3 px-3 py-3 d-flex align-items-center gap-3 w-100 h-100">
                                                <input type="radio" name="roomType" value="standard" class="form-check-input m-0 flex-shrink-0" />
                                                <i class="fa-solid fa-bed fs-5 flex-shrink-0"></i>
                                                <span class="fw-medium text-nowrap">Standard Room</span>
                                            </label>
                                        </div>

                                        <div class="col-12 col-md-6">
                                            <label class="option-card border rounded-3 px-3 py-3 d-flex align-items-center gap-3 w-100 h-100">
                                                <input type="radio" name="roomType" value="deluxe" class="form-check-input m-0 flex-shrink-0" />
                                                <i class="fa-solid fa-bed fs-5 flex-shrink-0"></i>
                                                <span class="fw-medium text-nowrap">Deluxe Suite</span>
                                            </label>
                                        </div>
                                    </div>

                                    <!-- Add-ons -->
                                    <h2 class="fs-6 fw-bold border-bottom pb-2 mb-3 mt-4">Add-ons</h2>

                                    <div class="d-flex flex-column gap-3">
                                        <label class="d-flex align-items-center gap-3 fs-6">
                                            <input type="checkbox" name="breakfast" class="form-check-input m-0 flex-shrink-0" />
                                            <i class="fa-solid fa-utensils addon-icon"></i>
                                            <span>Daily Breakfast</span>
                                        </label>

                                        <label class="d-flex align-items-center gap-3 fs-6">
                                            <input type="checkbox" name="parking" class="form-check-input m-0 flex-shrink-0" />
                                            <i class="fa-solid fa-square-parking addon-icon"></i>
                                            <span>Valet Parking</span>
                                        </label>

                                        <label class="d-flex align-items-center gap-3 fs-6">
                                            <input type="checkbox" name="lateCheckout" class="form-check-input m-0 flex-shrink-0" />
                                            <i class="fa-solid fa-clock addon-icon"></i>
                                            <span>Late Check-out</span>
                                        </label>
                                    </div>

                                    <!-- Advance Payment -->
                                    <div class="mt-4">
                                        <label for="advancePayment" class="form-label fw-bold">Advance Payment ($)</label>
                                        <input type="text" id="advancePayment" class="form-control form-control-lg rounded-3" placeholder="$ 50.00" />
                                    </div>

                                    <!-- Submit Button -->
                                    <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 py-3 mt-4">Complete</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
