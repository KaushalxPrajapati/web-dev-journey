<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GET Users</title>
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>

        <h1>GET Users</h1>
        <p class="description">Fetch and display all users from the server</p>

        <nav>
            <a href="index.html">Home</a>
            <a href="get.html" class="active">GET Users</a>
            <a href="add.html">ADD User</a>
            <a href="update.html">UPDATE User</a>
            <a href="delete.html">DELETE User</a>
        </nav>

        <div class="card">

            <button onclick="getUsers()">Fetch All Users</button>

            <p id="message"></p>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                    </tr>
                </thead>
                <tbody id="userTable"></tbody>
            </table>

        </div>

        <script>

            const message = document.getElementById("message");
            const userTable = document.getElementById("userTable");

            // Fetch all users from the server and display in table
            async function getUsers() {
                const res = await fetch("/users");
                const users = await res.json();

                // Clear old rows before adding new ones
                userTable.innerHTML = "";

                // Loop through each user and build a table row
                for (let user of users) {
                    userTable.innerHTML += `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.name}</td>
                    </tr>`;
                }

                message.className = "";
                message.textContent = `${users.length} user(s) found`;
            }

        </script>

    </body>
</html>
