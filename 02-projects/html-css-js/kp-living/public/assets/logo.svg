<svg width="420" height="140" viewBox="0 0 420 140" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">KP Living Logo</title>
  <desc id="desc">Transparent SVG logo for KP Living Premium Furniture with KP monogram and elegant wordmark.</desc>

  <defs>
    <linearGradient id="goldBrownGradient" x1="16" y1="18" x2="106" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C99A5B"/>
      <stop offset="0.48" stop-color="#9A6336"/>
      <stop offset="1" stop-color="#4E2C18"/>
    </linearGradient>

    <linearGradient id="wordGradient" x1="130" y1="42" x2="342" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6A3D20"/>
      <stop offset="1" stop-color="#3B2112"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#2A160B" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Transparent background: no rectangle or solid backdrop is used. -->

  <!-- Monogram mark -->
  <g filter="url(#softShadow)">
    <circle cx="64" cy="66" r="46" stroke="url(#goldBrownGradient)" stroke-width="4"/>
    <circle cx="64" cy="66" r="36" stroke="#C99A5B" stroke-width="1.4" stroke-opacity="0.55"/>

    <!-- Subtle home/furniture accent -->
    <path d="M41 47L64 31L87 47" stroke="url(#goldBrownGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M43 86H85" stroke="url(#goldBrownGradient)" stroke-width="3" stroke-linecap="round"/>

    <text x="64" y="78" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="43" font-weight="700" font-style="italic" fill="url(#goldBrownGradient)" letter-spacing="-4">KP</text>
  </g>

  <!-- Wordmark -->
  <g>
    <text x="130" y="66" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" fill="url(#wordGradient)" letter-spacing="1.2">LIVING</text>
    <text x="132" y="92" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#8B5A35" letter-spacing="3.1">PREMIUM FURNITURE</text>
    <path d="M132 102H354" stroke="url(#goldBrownGradient)" stroke-width="2.4" stroke-linecap="round" opacity="0.72"/>
    <path d="M132 108H236" stroke="#C99A5B" stroke-width="1.3" stroke-linecap="round" opacity="0.45"/>
  </g>
</svg>
