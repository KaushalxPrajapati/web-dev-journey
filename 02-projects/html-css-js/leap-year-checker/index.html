<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Leap Year Checker</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="card">
            <p class="label">CALENDAR UTILITY</p>
            <h1>
                Leap Year
                <span class="accent">Checker</span>
            </h1>
            <p class="subtext">Enter any year from 1 to 9999</p>

            <input type="number" id="enteredYear" placeholder="e.g. 2024" min="1" max="9999" inputmode="numeric" autocomplete="off" />
            <button id="checkButton">Check Year</button>
            <div id="result"></div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
