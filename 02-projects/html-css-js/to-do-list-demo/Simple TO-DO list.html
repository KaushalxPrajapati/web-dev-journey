<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TO-DO App</title>
    </head>

    <body>
        <h1>TO-DO App</h1>

        <h3>
            <ol type="i">
                <li>Enter "list" to show all tasks</li>
                <li>Enter "add" to add a task</li>
                <li>Enter "delete" to remove a task</li>
                <li>Enter "quit" to quit to-do app</li>
            </ol>
        </h3>

        <script src="Simple TO-DO list.js"></script>
    </body>
</html>
