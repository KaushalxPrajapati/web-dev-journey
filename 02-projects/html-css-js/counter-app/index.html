<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Counter</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<div id="centre-container">
		<div id="box">
			<p id="num">0</p>

			<div class="buttons btns">
				<button class="btn red" id="decrementBtn">&ndash;</button>
				<button class="btn reset" id="resetBtn">Reset</button>
				<button class="btn blue" id="loadBtn">Load</button>
				<button class="btn yellow" id="saveBtn">Save</button>
				<button class="btn green" id="incrementBtn">+</button>
			</div>
		</div>
	</div>


	<script src="script.js"></script>
</body>

</html>
