<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>My Calculator</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">
	<div class="card p-4 rounded-5 shadow-lg border-5">
		<div class="display mb-4 px-3 text-white text-end" id="display">0</div>
		<div class="buttons-grid">
			<!-- Row 1 -->
			<button class="btn btn-secondary rounded-circle" data-key="clear">C</button>
			<button class="btn btn-secondary rounded-circle" data-key="sign"><b><sup>+</b></sup>/<sub>-</sub></button>
			<button class="btn btn-secondary rounded-circle" data-key="percent">%</button>
			<button class="btn btn-warning  rounded-circle" data-key="divide">÷</button>

			<!-- Row 2 -->
			<button class="btn btn-dark rounded-circle" data-key="7">7</button>
			<button class="btn btn-dark rounded-circle" data-key="8">8</button>
			<button class="btn btn-dark rounded-circle" data-key="9">9</button>
			<button class="btn btn-warning rounded-circle" data-key="multiply">x</button>

			<!-- Row 3 -->
			<button class="btn btn-dark rounded-circle" data-key="4">4</button>
			<button class="btn btn-dark rounded-circle" data-key="5">5</button>
			<button class="btn btn-dark rounded-circle" data-key="6">6</button>
			<button class="btn btn-warning rounded-circle" data-key="subtract">-</button>

			<!-- Row 4 -->
			<button class="btn btn-dark rounded-circle" data-key="1">1</button>
			<button class="btn btn-dark rounded-circle" data-key="2">2</button>
			<button class="btn btn-dark rounded-circle" data-key="3">3</button>
			<button class="btn btn-warning rounded-circle" data-key="add">+</button>

			<!-- Row 5 -->
			<button class="btn btn-dark rounded-pill zero-btn" data-key="0">0</button>
			<button class="btn btn-dark rounded-circle" data-key=".">.</button>
			<button class="btn btn-warning rounded-circle" data-key="equals">=</button>
		</div>
	</div>

	<script src="script.js"></script>
	<!-- <script src="script2.js"></script> -->
	<!-- <script src="script3.js"></script>
	<script src="test.js"></script> -->
	<!-- <script src="u.js"></script> -->
</body>

</html>
