<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sign Up Form</title>
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <form action="submitted.html" class="form-container">
            <div class="name">
                <input class="first-name" type="text" placeholder="First name" name="firstName" autofocus required />
                <input class="last-name" type="text" placeholder="Last name" name="lastName" />
            </div>

            <input type="email" placeholder="Email" name="email" autocomplete="email" autocapitalize="off" required />

            <button type="submit">Sign Up</button>
        </form>
    </body>
</html>
