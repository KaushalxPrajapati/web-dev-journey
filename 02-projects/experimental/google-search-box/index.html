<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Google</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>
    <body>
        <div class="centre-container">
            <form action="https://google.com/search" method="GET" class="form-elements">
                <img src="google-logo.png" alt="Google Logo" />

                <div class="search-input">
                    <input type="text" placeholder="Search Google or type URL" name="q" />
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>

                <div class="btns">
                    <button type="submit">Google Search</button>
                    <button type="submit" name="q" value="I'm Feeling Lucky">I'm Feeling Lucky</button>
                </div>
            </form>
        </div>
    </body>
</html>
