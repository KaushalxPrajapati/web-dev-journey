<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who to Follow UI</title>
    <link rel="stylesheet" href="12g.css" />
</head>
<body>
    <div class="wrapper">
        <h2 class="header-title">Who to follow</h2>
        
        <div class="row">
            <img class="profile-picture" src="cat.jpg" alt="Oliver" />
            <div class="info">
                <p class="name">Oliver</p>
                <p class="handle">@thecat</p>
            </div>
            <button class="follow-button">Follow</button>
        </div>

        <div class="row">
            <img class="profile-picture" src="cat2.jpg" alt="Mimi" />
            <div class="info">
                <p class="name">Mimi</p>
                <p class="handle">@sleepycat</p>
            </div>
            <button class="follow-button">Follow</button>
        </div>

        <div class="row">
            <img class="profile-picture" src="dog.jpg" alt="Rex" />
            <div class="info">
                <p class="name">Rex</p>
                <p class="handle">@happybulldog</p>
            </div>
            <button class="follow-button">Follow</button>
        </div>

        <div class="show-more">
            <a href="#">Show more</a>
        </div>
    </div>
</body>
</html>
