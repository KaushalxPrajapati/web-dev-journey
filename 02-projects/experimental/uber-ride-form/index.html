<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <form class="form-container">
            <h1>Request a ride now</h1>
            <div class="form-fields">
                <input type="text" placeholder="Enter pickup location" autofocus autocomplete="on" />
                <input type="text" placeholder="Enter destination" />
            </div>

            <div class="btns">
                <button type="submit">Request now</button>
                <button>Schedule for later</button>
            </div>
        </form>

        <script>
            let inputs = document.querySelectorAll('input'); // Targeted selector
            inputs.forEach((input) => {
                input.addEventListener('input', () => {
                    if (input.value.length > 0) {
                        input.classList.add('fade-placeholder');
                    } else {
                        input.classList.remove('fade-placeholder');
                    }
                });
            });
        </script>
    </body>
</html>
