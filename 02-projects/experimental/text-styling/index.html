<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Font styling</title>
        <style>
            .one {
                font-family: Tahoma;
                font-weight: bold;
                font-size: 20px;
            }

            .two {
                font-family: Arial;
                font-weight: bold;
                font-size: 25px;
                margin-bottom: 0;
            }

            .three {
                color: blue;
                font-family: Arial;
                font-style: italic;
                font-size: 18px;
                margin-top: 8px;
            }
        </style>
    </head>
    <body>
        <p class="one">This is Tahoma Font</p>
        <p class="two">Biggest Deals of the Year!</p>
        <p class="three">Sales end Tuesday</p>
    </body>
</html>
