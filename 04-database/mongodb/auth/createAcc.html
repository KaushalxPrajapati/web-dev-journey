<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login Form</title>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />

        <style>
            body {
                background-color: rgb(248, 250, 252);
            }

            .auth-card {
                max-width: 400px;
                margin: 67px auto;
            }

            .form-control {
                border-radius: 10px;
                padding: 0.7rem 1rem;
            }

            .form-control:focus {
                border-color: #2563eb;
                box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
            }

            .btn-primary {
                border-radius: 10px;
                padding: 0.75rem;
                font-weight: 600;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="card auth-card shadow rounded-4">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold mb-0">Create your account</h2>
                    </div>

                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="name">Name</label>
                            <input
                                type="text"
                                placeholder="Enter your name"
                                name="name"
                                class="form-control"
                                id="name"
                                minlength="1"
                                required
                            />
                        </div>

                        <div class="mb-3">
                            <label for="loginEmail" class="form-label">Email address</label>
                            <input
                                type="email"
                                placeholder="Enter your email address"
                                name="email"
                                class="form-control"
                                id="loginEmail"
                                required
                            />
                        </div>

                        <div class="mb-3">
                            <label for="loginPassword" class="form-label">Password</label>
                            <div class="input-group">
                                <input
                                    type="password"
                                    placeholder="Enter your password"
                                    name="password"
                                    class="form-control"
                                    id="loginPassword"
                                    required
                                />
                            </div>
                        </div>

                        <div id="formError" class="alert alert-danger d-none py-2"></div>
                        <div id="formSuccess" class="alert alert-success d-none py-2"></div>

                        <button type="submit" class="btn btn-primary w-100 py-2">Sign Up</button>
                    </form>
                </div>
            </div>
        </div>

        <script>
            const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';
            const registerForm = document.getElementById('registerForm');
            const errorBox = document.getElementById('formError');
            const successBox = document.getElementById('formSuccess');

            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorBox.classList.add('d-none');
                successBox.classList.add('d-none');

                const payload = {
                    email: document.getElementById('loginEmail').value,
                    password: document.getElementById('loginPassword').value,
                };

                try {
                    const response = await fetch(`${API_BASE}/api/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.message || 'Registration failed');
                    }

                    successBox.textContent = data.message || 'Account created successfully';
                    successBox.classList.remove('d-none');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1000);
                } catch (error) {
                    errorBox.textContent = error.message;
                    errorBox.classList.remove('d-none');
                }
            });
        </script>
    </body>
</html>
