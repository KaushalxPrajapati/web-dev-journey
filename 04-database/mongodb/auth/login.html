<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login Form</title>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />

        <style>
            body {
                background-color: rgb(248, 250, 252);
            }

            .auth-card {
                max-width: 400px;
                margin: 67px auto;
            }

            .form-control {
                border-radius: 10px;
                padding: 10px 16px;
            }

            .form-control:focus {
                border-color: #2563eb;
                box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
            }

            .btn-primary {
                border-radius: 10px;
                padding: 0.75rem;
                font-weight: 600;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="card auth-card shadow rounded-4">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold mb-2">Welcome back</h2>
                        <p class="text-muted mb-0">Sign in to continue</p>
                    </div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label">Email address</label>
                            <input
                                type="email"
                                class="form-control"
                                id="loginEmail"
                                name="email"
                                placeholder="Enter your email address"
                                required
                            />
                        </div>

                        <div class="mb-3">
                            <label for="loginPassword" class="form-label">Password</label>
                            <div class="input-group">
                                <input
                                    type="password"
                                    name="password"
                                    placeholder="Enter your password"
                                    class="form-control"
                                    id="loginPassword"
                                    required
                                />
                            </div>
                        </div>

                        <div id="formError" class="alert alert-danger d-none py-2"></div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe" checked />
                                <label class="form-check-label" for="rememberMe">Remember me</label>
                            </div>
                            <a href="#" id="forgotPass" class="text-danger text-decoration-none small">
                                Forgot password?
                            </a>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2">Sign In</button>

                        <div class="text-center mt-4">
                            <p class="mb-0 text-muted">
                                Don't have an account?
                                <a
                                    href="/createAcc.html"
                                    id="showRegister"
                                    class="text-primary text-decoration-none fw-semibold"
                                >
                                    Create one
                                </a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script>
            const forgotPassLink = document.getElementById('forgotPass');
            forgotPassLink.addEventListener('click', () => {
                window.location.href = 'resetPassword.html';
            });
        </script>
    </body>
</html>
