<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Reset Your Password</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
            integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />

        <style>
            body {
                font-family: sans-serif;
                background-color: rgb(248, 250, 252);

                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }
            .reset-card {
                max-width: 420px;
                margin: 0 auto;
            }

            a span {
                color: black;
                transition: color 0.1s ease-in-out;
            }

            a:hover span {
                color: white;
            }

            .bottom-div {
                border-top: 2px solid #dee2e6;
                border-bottom-left-radius: 1rem;
                border-bottom-right-radius: 1rem;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="card shadow rounded-4 reset-card">
                <div class="card-body p-0">
                    <div class="text-center mb-4 pt-3 small mt-3">
                        <i class="fas fa-key fa-2x text-secondary mb-3"></i>
                        <h5 class="fw-bold mb-2">Reset Password</h5>
                        <p>Enter your email to receive reset instructions</p>
                    </div>

                    <div class="pt-1 mb-5 px-5">
                        <label for="email" class="form-label fw-semibold small">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="Enter your email" />

                        <a href="login.html" class="btn btn-outline-secondary w-100 mt-3">
                            <span class="fw-semibold">Send Instructions</span>
                        </a>
                    </div>

                    <div class="bottom-div bg-light text-center w-100 py-3 small">
                        <p class="text-center text-muted border-top-2-secondary mb-1">
                            <span class="fw-semibold">Remember your password? ·</span>
                            <a href="login.html" class="text-decoration-none">Back to Login</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
