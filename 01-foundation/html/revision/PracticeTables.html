<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Food Menu</title>
	<style>
		body {
			display: flex;
			justify-content: center;
			align-items: center;

			min-height: 100vh;
		}

		table {
			width: 30%;
			height: 300px;

			border-collapse: collapse;
			border: 2px solid black;
		}

		th,
		td {
			border: 1px solid black;
			padding: 10px;
			text-align: center;
		}

		caption {
			margin-bottom: 0.25em;
		}

		thead {
			background-color: lightgrey
		}

		tbody {
			background-color: whitesmoke;
		}

		tfoot tr td:first-child {
			background-color: lightgreen;
		}

		tfoot tr td:nth-of-type(n+2) {
			background-color: lightyellow;
		}
	</style>
</head>

<body>
	<table>
		<caption>Food Menu</caption>
		<thead>
			<tr>
				<th rowspan="2">Item</th>
				<th colspan="2">Price</th>
			</tr>
			<tr>
				<th>INR</th>
				<th>USD</th>
			</tr>
		</thead>
		<tbody>
			<tr>
				<td>Footi</td>
				<td>10</td>
				<td>0.14</td>
			</tr>

			<tr>
				<td>Samosa</td>
				<td>12</td>
				<td>0.17</td>
			</tr>

			<tr>
				<td>Chips</td>
				<td>20</td>
				<td>0.28</td>
			</tr>

		</tbody>

		<tfoot>
			<tr>
				<td>Sum: </td>
				<td>42</td>
				<td>0.59</td>
			</tr>
		</tfoot>
	</table>
</body>

</html>
