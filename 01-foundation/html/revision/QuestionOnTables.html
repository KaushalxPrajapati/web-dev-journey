<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		table {
			border-collapse: collapse;
		}

		th,
		td {
			border: 1px solid black;
			padding: 10px;
			text-align: center;
		}

		#centre {
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
		}
	</style>
</head>

<body>
	<div id="centre">
		<table>
			<caption>Impact of Screen Exposure on Eye Health and Physical Metrics by Gender</caption>
			<thead>
				<tr>
					<th rowspan="2">Gender</th>
					<th colspan="2">Average</th>
					<th rowspan="2">Red eyes</th>
				</tr>
				<tr>
					<th>Height (m)</th>
					<th>Weight (kg)</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td>Male</td>
					<td>1.75</td>
					<td>78</td>
					<td>12%</td>
				</tr>

				<tr>
					<td>Female</td>
					<td>1.62</td>
					<td>65</td>
					<td>10%</td>
				</tr>

			</tbody>
			<tfoot>
				<tr>
					<td colspan="4">(Sample Dataset)</td>
				</tr>
			</tfoot>
		</table>
	</div>
</body>

</html>
