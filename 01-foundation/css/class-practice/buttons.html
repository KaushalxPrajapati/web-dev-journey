<!DOCTYPE html>
<html>
    <head>
        <title>Buttons Practice</title>
        <link rel="stylesheet" href="button.css">
    </head>
    <body>
        <button class="subscribe-button">
            SUBSCRIBE
        </button>

        <button class="join-button">
            JOIN
        </button>

        <button class="tweet-button">
            Tweet
        </button>
    </body>
</html>


<!-- CSS Concepts Learned and Applied

1. CSS Basics
- Selectors: Target HTML elements using class selectors (e.g., .subscribe-button).
- Properties: Apply styles such as height, width, background-color, color, border, border-radius, cursor, and margin.
- Units: Utilize units like px for sizing and rgb() for color definitions.

2. Pseudo-classes
- :hover — Define styles when the user hovers over an element.
  Example: .subscribe-button:hover { opacity: 0.75; }
- :active — Define styles when the element is activated (e.g., clicked).
  Example: .subscribe-button:active { opacity: 0.5; }

3. Transitions
- Purpose: Create smooth animations between property changes.
- Usage: Apply the transition property to elements.
  Example: transition: opacity 0.2s;

4. Box Shadow
- Purpose: Add depth to elements by applying shadows.
- Usage: Use the box-shadow property.
  Example: .tweet-button:hover { box-shadow: 1px 1px 5px rgba(0,0,0,0.15); }

5. Button Styling
- Dimensions: Set height and width to define button size.
- Colors: Use background-color and color to set background and text colors.
- Borders: Customize borders using border, border-color, border-style, and border-width.
- Border Radius: Apply border-radius for rounded corners.
- Cursor: Set cursor: pointer; to change the cursor on hover.
- Font Styling: Adjust font-size and font-weight for text appearance.
- Spacing: Use margin properties to space elements appropriately.

6. Combining Effects
- Multiple Transitions: Apply multiple transitions simultaneously.
  Example: transition: background-color 0.2s, color 0.2s;
- Interactive Feedback: Combine :hover, :active, and transition to enhance user interaction.

7. Practical Application
- Button Types:
  - Subscribe Button: Red background, white text, changes opacity on hover and active states.
  - Join Button: White background, blue border and text, inverts colors on hover.
  - Tweet Button: Blue background, white bold text, adds shadow on hover.

8. Best Practices
- Consistency: Maintain consistent styling across similar elements.
- User Experience: Enhance interactivity with hover and active states.
- Performance: Use transitions and shadows judiciously to maintain performance. -->
