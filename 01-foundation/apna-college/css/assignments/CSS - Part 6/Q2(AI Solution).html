<!DOCTYPE html>
<html lang="en">
    <head>
        <title>CSS Grid</title>
        <link rel="stylesheet" href="Q2(AI Solution).css">
    </head>
    <body>
        <div class="content">
            <div class="container">
                <div class="header">
                    <span class="desktop-text">header (1row, 12column)</span>
                    <span class="mobile-text">header (1row, 12column)</span>
                </div>
                <div class="navigation">
                    <span class="desktop-text">navigation (1row, 6column)</span>
                    <span class="mobile-text">navigation (1row, 12column)</span>
                </div>
                <div class="sidebar">
                    <span class="desktop-text">sidebar (10row, 3column)</span>
                    <span class="mobile-text">sidebar (9row, 3column)</span>
                </div>
                <div class="main">
                    <span class="desktop-text">main (9row, 6column)</span>
                    <span class="mobile-text">main (9row, 9column)</span>
                </div>
                <div class="ads">
                    <span class="desktop-text">ads (10row, 3column)</span>
                    <span class="mobile-text">ads (1row, 3column)</span>
                </div>
                <div class="footer">
                    <span class="desktop-text">footer (1row, 12column)</span>
                    <span class="mobile-text">footer (1row, 9column)</span>
                </div>
            </div>
        </div>
    </body>
</html>
