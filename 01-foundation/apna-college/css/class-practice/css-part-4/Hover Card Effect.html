<!DOCTYPE html>
<html lang="en">

<head>
    <title>Hover Card Effect</title>
    <link rel="stylesheet" href="Hover Card Effect.css">
</head>

<body>
    <div class="card">
        <img src="man.png" alt="man" />
        <div class="desc">

        </div>
    </div>
</body>

</html>
