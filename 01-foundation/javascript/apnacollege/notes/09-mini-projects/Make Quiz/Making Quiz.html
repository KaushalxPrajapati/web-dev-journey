<!doctype html>
<html>
    <head>
        <title>Basic Science & GK Quiz</title>
        <link rel="stylesheet" href="Making Quiz.css" />
    </head>
    <body>
        <h2>Basic Science & GK Quiz</h2>
        <form action="Making Quiz(result).html">
            <div class="question">
                <p>1. What planet is known as the Red Planet?</p>
                <input type="radio" id="q1a" name="q1" value="Mars" />
                <label for="q1a">Mars</label><br />

                <input type="radio" id="q1b" name="q1" value="Jupiter" />
                <label for="q1b">Jupiter</label><br />

                <input type="radio" id="q1c" name="q1" value="Venus" />
                <label for="q1c">Venus</label><br />

                <input type="radio" id="q1d" name="q1" value="Mercury" />
                <label for="q1d">Mercury</label>
            </div>

            <div class="question">
                <p>2. Who invented the light bulb?</p>
                <input type="radio" id="q2a" name="q2" value="Edison" />
                <label for="q2a">Thomas Edison</label><br />

                <input type="radio" id="q2b" name="q2" value="Newton" />
                <label for="q2b">Isaac Newton</label><br />

                <input type="radio" id="q2c" name="q2" value="Tesla" />
                <label for="q2c">Nikola Tesla</label><br />

                <input type="radio" id="q2d" name="q2" value="Galileo" />
                <label for="q2d">Galileo Galilei</label>
            </div>

            <div class="question">
                <p>3. What gas do plants absorb from the atmosphere?</p>
                <input type="radio" id="q3a" name="q3" value="CO2" />
                <label for="q3a">Carbon dioxide</label><br />

                <input type="radio" id="q3b" name="q3" value="O2" />
                <label for="q3b">Oxygen</label><br />

                <input type="radio" id="q3c" name="q3" value="H2" />
                <label for="q3c">Hydrogen</label><br />

                <input type="radio" id="q3d" name="q3" value="N2" />
                <label for="q3d">Nitrogen</label>
            </div>

            <div class="question">
                <p>4. What is the boiling point of water at sea level?</p>
                <input type="radio" id="q4a" name="q4" value="100" />
                <label for="q4a">100°C</label><br />

                <input type="radio" id="q4b" name="q4" value="90" />
                <label for="q4b">90°C</label><br />

                <input type="radio" id="q4c" name="q4" value="80" />
                <label for="q4c">80°C</label><br />

                <input type="radio" id="q4d" name="q4" value="120" />
                <label for="q4d">120°C</label>
            </div>

            <div class="question">
                <p>5. Which country is known as the Land of the Rising Sun?</p>
                <input type="radio" id="q5a" name="q5" value="Japan" />
                <label for="q5a">Japan</label><br />

                <input type="radio" id="q5b" name="q5" value="China" />
                <label for="q5b">China</label><br />

                <input type="radio" id="q5c" name="q5" value="Korea" />
                <label for="q5c">South Korea</label><br />

                <input type="radio" id="q5d" name="q5" value="India" />
                <label for="q5d">India</label>
            </div>

            <button>Submit</button>
        </form>

        <script src="Making Quiz.js"></script>
    </body>
</html>
