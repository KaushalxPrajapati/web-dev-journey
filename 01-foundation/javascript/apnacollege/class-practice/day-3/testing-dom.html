<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>DOM Test</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			font-family: monospace;
		}

		h2 {
			text-align: center;
			margin-bottom: 0.5em;
		}

		.container {
			height: 100vh;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
		}

		#content p {
			display: inline;
		}

		#content button {
			padding: 1em 2em;
			/* border: none; */
			border: 1px solid black;
			border-radius: 10px;
			background-color: rgb(138, 23, 26);
			color: white;
		}

		button:visited {
			background-color: darkblue;
			/* transform: translateY(2px); */
			/* Moves the button down slightly */
		}
	</style>
</head>

<body>
	<div class="container">
		<h2> Click the button and see...</h2>
		<div id="content">
			<p>I am ... &nbsp; </p>
			<button onclick='document.querySelector("button").innerHTML = "Iron Man!"'>Click me</button>
		</div>
	</div>

</body>

</html>
