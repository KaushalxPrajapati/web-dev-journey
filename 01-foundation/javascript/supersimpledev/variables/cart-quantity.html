<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Cart Quantity</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: sans-serif;
            }

            body {
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .card {
                border: 2px solid lightgray;
            }

            h3 {
                font-size: 1.25em;
                text-align: center;

                padding: 1.125em 0;
            }

            button {
                outline: none;
                border: none;
                border-radius: 0.5em;
                padding: 1em;
                margin: 0 1em 1em 1em;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h3>Cart Quantity</h3>
            <button onclick="plusOne()">Add to Cart</button>
            <button onclick="plusOne()">+1</button>
            <button onclick="reset()">Reset</button>
            <button onclick="plusTwo()">+2</button>
            <button onclick="show()">Show Quantity</button>
        </div>

        <script>
            let cartQuantity = 0;

            function plusOne() {
                cartQuantity++;
                console.log(`Cart Quantity: ${cartQuantity}`);
            }

            function plusTwo() {
                cartQuantity = cartQuantity + 2;
                console.log(`Cart Quantity: ${cartQuantity}`);
            }

            function reset() {
                cartQuantity = 0;
                console.log(`Cart has been Reset: ${cartQuantity}`);
            }

            function show() {
                console.log(`Cart Quantity: ${cartQuantity}`);
            }
        </script>
    </body>
</html>
