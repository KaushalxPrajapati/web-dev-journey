<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sample</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: sans-serif;
            }

            body {
                height: 100vh;
                display: flex;
                flex-direction: row;
                justify-content: center;
                align-items: center;
            }

            .card {
                background-color: whitesmoke;
                padding: 1.5em;

                border: 2px solid lightgray;
                border-radius: 7px;

                font-size: 1.25em;
            }

            .info p + p {
                margin-top: 1em;
            }

            span button {
                margin: 16px 10px 0 0;
                font-size: 15px;
                padding: 0.75em;
                border-radius: 0.25em;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="info">
                <p>Adults Plain Cotton T-shirt</p>
                <p>Price: $7.99</p>
            </div>

            <span>
                <button style="background-color: yellow" id="addToCart" onclick="alert('Item added to Cart...!')">Add to Cart</button>
                <button style="background-color: orange" id="buyNow" onclick="alert('Thankyou for Your Order, Item has been Purchased...!')">Buy Now</button>
            </span>
        </div>

        <script>

            //     alert('Item added to Cart...!');
            // });

            //     alert('Thankyou for Your Order, Item has been Purchased...!');
            // });
        </script>
    </body>
</html>
