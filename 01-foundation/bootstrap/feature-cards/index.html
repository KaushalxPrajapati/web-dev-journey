<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Project 2: Feature Cards</title>

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />

        <!-- Your custom CSS (optional for now) -->
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <section class="py-5 bg-light">
            <div class="container">
                <div class="row g-4">
                    <!-- Card 1 -->
                    <div class="col-12 col-md-6 col-lg-4">
                        <article class="card h-100 border-0 shadow-sm">
                            <div class="card-body">
                                <h3 class="h5 card-title">Fast Performance</h3>
                                <p class="card-text">Our platform loads in under 1 second on average.</p>
                            </div>
                        </article>
                    </div>

                    <!-- Card 2 -->
                    <div class="col-12 col-md-6 col-lg-4">
                        <article class="card h-100 border-0 shadow-sm">
                            <div class="card-body">
                                <h3 class="h5 card-title">Secure by Design</h3>
                                <p class="card-text">Enterprise-grade encryption with regular security audits.</p>
                            </div>
                        </article>
                    </div>

                    <!-- Card 3 -->
                    <div class="col-12 col-md-6 col-lg-4">
                        <article class="card h-100 border-0 shadow-sm">
                            <div class="card-body">
                                <h3 class="h5 card-title">24/7 Expert Support</h3>
                                <p class="card-text">Our team is always available to help you succeed.</p>
                            </div>
                        </article>
                    </div>
                </div>
            </div>
        </section>

        <!-- Bootstrap JS Bundle -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    </body>
</html>
