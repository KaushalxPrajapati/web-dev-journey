<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>HTML - Class 1</title>
</head>

<body>
	<form action="#" method="post">
		<label for="name">Username: </label>
		<input type="text" placeholder="Enter your name:" id="name" required autofocus />
		<br>
		<br>
		<label for="password">Password: </label>
		<input type="password" placeholder="Enter your password:" id="password" required autofocus>

		<br>
		<br>
		<textarea placeholder="Write your comment here..." rows="10" cols="60"></textarea>

		<br>
		<br>

		<input type="radio" id="gender" checked>
		<label for="gender">Male</label>

		<input type="radio" id="gender">
		<label for="gender">Female</label>

		<br>
		<br>

		<!-- Method 1 -->
		<button>Submit</button>

		<!-- Method 2 -->
		<!-- <input type="button" value="Submit"> -->

		<!-- // Reset button -->
		<button type="reset">Reset</button>

		<!-- 

		What Did I do?

		1. Added 'autofocus' on username and 'required' on password
		2. Added textarea element with 'rows' and 'cols' attributes
		3. Added 'radio' buttons
		4. Added reset button
		
		-->
	</form>
</body>

</html>
