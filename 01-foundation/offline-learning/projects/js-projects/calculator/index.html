<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>My Calculator</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">
	<div class="card p-4 rounded-5 shadow-lg border-0">
		<div class="display mb-4 px-3 text-white text-end" id="display">0</div>
		<div class="buttons-grid">
			<button class="btn btn-secondary rounded-circle" id="clear">C</button>
			<button class="btn btn-secondary rounded-circle" id="sign"><b><sup>+</b></sup>/-</button>
			<button class="btn btn-secondary rounded-circle" id="percent">%</button>
			<button class="btn btn-warning rounded-circle" id="divide">÷</button>

			<button class="btn btn-dark rounded-circle" data-value="7">7</button>
			<button class="btn btn-dark rounded-circle" data-value="8">8</button>
			<button class="btn btn-dark rounded-circle" data-value="9">9</button>
			<button class="btn btn-warning rounded-circle" id="multiply">x</button>

			<button class="btn btn-dark rounded-circle" data-value="4">4</button>
			<button class="btn btn-dark rounded-circle" data-value="5">5</button>
			<button class="btn btn-dark rounded-circle" data-value="6">6</button>
			<button class="btn btn-warning rounded-circle" id="subtract">-</button>

			<button class="btn btn-dark rounded-circle" data-value="1">1</button>
			<button class="btn btn-dark rounded-circle" data-value="2">2</button>
			<button class="btn btn-dark rounded-circle" data-value="3">3</button>
			<button class="btn btn-warning rounded-circle" id="add">+</button>

			<button class="btn btn-dark rounded-pill zero-btn" data-value="0">0</button>
			<button class="btn btn-dark rounded-circle" data-value=".">.</button>
			<button class="btn btn-warning rounded-circle" id="equals">=</button>
		</div>
	</div>

	<script src="script.js"></script>
</body>

</html>
